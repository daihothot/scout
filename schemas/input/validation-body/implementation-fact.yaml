module: implementation-fact
imports:
  source-ref:
    - SourcedClaim
exports:
  ImplementationFact:
    kind: interface
    description: 当前 BDD 相关的生产实现覆盖投影；只记录已通过 CodeGraph 或合规 rg 回退校验的生产源码、配置、API、symbol 或 artifact 事实。
    fields:
      fact_id:
        type: string
        required: true
        description: implementation fact 稳定 ID。
      fact_type:
        type: '"implementation_fact"'
        required: true
        description: 固定为 implementation_fact。
      coverage_status:
        type: '"covered" | "partial" | "missing" | "out_of_scope"'
        required: true
        description: 当前 BDD 对应实现覆盖状态；必须由 claim 与 evidence 支撑。
      claims:
        type: SourcedClaim[]
        required: true
        description: 生产实现覆盖、源码/API/配置/artifact、历史 gap 与当前验证影响的 claim；不得纳入测试代码。
