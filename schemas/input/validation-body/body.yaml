module: body
imports:
  source-ref:
    - SourcedClaim
  bdd-fact:
    - BddFact
  capability-fact:
    - CapabilityFact
  requirement-fact:
    - RequirementFact
  specification-fact:
    - SpecificationFact
  feature-fact:
    - FeatureFact
  implementation-fact:
    - ImplementationFact
exports:
  ValidationCatalogRef:
    kind: inline_object
    fields:
      catalog_id:
        type: string
        required: true
        description: 与本 ValidationBody 配套的 catalog ID；只要求在当前 run 内稳定。
      uri:
        type: string
        required: true
        description: catalog JSON 的本地路径、运行时 URI 或相对路径。
      digest:
        type: string
        required: false
        description: 可选内容摘要；用于需要时校验 catalog 未漂移。
  AcceptanceCriteria:
    kind: inline_object
    description: 当前 BDD 的验收口径；只写有证据、有意义、会影响 Planner 判断的条件。
    fields:
      pass_conditions:
        type: SourcedClaim[]
        required: false
        description: 满足哪些明确条件才算验证通过；没有明确依据时不要填写。
      fail_conditions:
        type: SourcedClaim[]
        required: false
        description: 出现哪些明确条件应判定为失败；没有明确依据时不要填写。
      insufficient_evidence_conditions:
        type: SourcedClaim[]
        required: false
        description: 哪些情况下不能判定通过；只记录已确认的证据不足条件。
  ValidationBody:
    kind: interface
    fields:
      validationBodyId:
        type: string
        required: true
        description: 本次 run 内部 Validation Body ID；用于 run 内追踪和历史归类，不作为跨 run 业务身份。
      bodyType:
        type: '"validation_body"'
        required: true
        description: 固定类型标识，表示这是 Scout 内部的 Validation Body。
      runId:
        type: string
        required: true
        description: 生成该 ValidationBody 的 run ID。
      createdAt:
        type: string
        required: true
        description: 该 ValidationBody 创建时间。
      catalog_ref:
        type: ValidationCatalogRef
        required: true
        description: 本 ValidationBody 配套的 run 内引用目录；所有 source_ref_ids 和 evidence_ref_ids 都必须在该 catalog 中解析。
      bdd_fact:
        type: BddFact
        required: true
        description: BDD 事实；承载当前 BDD 的 Given / When / Then 和场景身份。
      requirement_facts:
        type: RequirementFact[]
        required: false
        description: 当前 BDD 相关的需求意图和验收口径；只保留会影响 Planner 的 claim。
      specification_facts:
        type: SpecificationFact[]
        required: false
        description: 当前 BDD 相关的设计承诺和规格约束；只保留会影响 Planner 的 claim。
      feature_facts:
        type: FeatureFact[]
        required: false
        description: 当前 BDD 相关的 synaptic proposal 事实；只保留 proposal 中会影响 Planner 的 claim。
      implementation_facts:
        type: ImplementationFact[]
        required: false
        description: 当前 BDD 相关的生产实现覆盖；只保留经过源码真实性校验的 claim。
      capability_facts:
        type: CapabilityFact[]
        required: false
        description: 当前 BDD 条件下的 capability 摘要投影；只保留对 Plan 有用的信息。
      acceptance_criteria:
        type: AcceptanceCriteria
        required: false
        description: 本次验证的通过、失败和证据不足条件；不要为了填满字段编造。
      given:
        type: string[]
        required: true
        description: 从 bdd_fact.given[].text 投影出的 Given 文本，供 Planner 快速读取。
      when:
        type: string[]
        required: true
        description: 从 bdd_fact.when[].text 投影出的 When 文本，供 Planner 快速读取。
      then:
        type: string[]
        required: true
        description: 从 bdd_fact.then[].text 投影出的 Then 文本，供 Planner 快速读取。
      constraints:
        type: SourcedClaim[]
        required: false
        description: 输入材料中明确限制执行、判断、资源、环境或安全边界的约束。
      uncertainty_items:
        type: SourcedClaim[]
        required: false
        description: 输入中缺失、矛盾、不可观测或需要人工处理的不确定项。
