module: capability-fact
imports:
  source-ref:
    - SourcedClaim
exports:
  CapabilityFact:
    kind: interface
    description: 当前 BDD 条件下的 capability 摘要投影；只保留对 Plan 有用的信息，不复刻 hippocampus capability 对象。
    fields:
      fact_id:
        type: string
        required: true
        description: capability fact 稳定 ID，建议包含 BDD scenario 与来源 capability。
      fact_type:
        type: '"capability_fact"'
        required: true
        description: 固定为 capability_fact。
      relevant_bdd_refs:
        type: string[]
        required: true
        description: 该 capability fact 直接服务的 BDD 场景 ID。
      claims:
        type: SourcedClaim[]
        required: true
        description: 对当前 BDD 有用的 capability 事实；每一句都必须可追溯到具体来源。
      excluded_context:
        type: SourcedClaim[]
        required: false
        description: 已遍历但不进入 Planner 主上下文的 capability/synaptic/knowledge 信息及排除原因。
