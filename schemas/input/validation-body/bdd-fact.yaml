module: bdd-fact
imports:
  source-ref:
    - SourcedClaim
exports:
  BddFact:
    kind: interface
    description: 当前验证的 BDD 事实投影；只承载 BDD identity、Given/When/Then 与对 Planner 有用的场景约束。
    fields:
      fact_id:
        type: string
        required: true
        description: BDD fact 稳定 ID。
      fact_type:
        type: '"bdd_fact"'
        required: true
        description: 固定为 bdd_fact。
      scenario_id:
        type: string
        required: true
        description: BDD 场景稳定 ID。
      claims:
        type: SourcedClaim[]
        required: false
        description: 除 Given / When / Then 之外仍会影响 Planner 的 BDD 场景 claim；没有明确来源或用途时不要填写。
      given:
        type: SourcedClaim[]
        required: true
        description: BDD Given 语义；每个步骤都必须是带来源 claim。
      when:
        type: SourcedClaim[]
        required: true
        description: BDD When 语义；每个步骤都必须是带来源 claim。
      then:
        type: SourcedClaim[]
        required: true
        description: BDD Then 语义；每个步骤都必须是带来源 claim。
