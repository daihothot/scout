module: specification-fact
imports:
  source-ref:
    - SourcedClaim
exports:
  SpecificationFact:
    kind: interface
    description: 当前 BDD 相关的设计承诺投影；只保留会约束 Planner 验证策略的规格信息。
    fields:
      fact_id:
        type: string
        required: true
        description: specification fact 稳定 ID。
      fact_type:
        type: '"specification_fact"'
        required: true
        description: 固定为 specification_fact。
      claims:
        type: SourcedClaim[]
        required: true
        description: 设计承诺、非目标、边界约束和与当前 BDD 的关系 claim。
