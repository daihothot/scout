module: requirement-fact
imports:
  source-ref:
    - SourcedClaim
exports:
  RequirementFact:
    kind: interface
    description: 当前 BDD 相关的需求、规格或 feature 意图投影；只保留 Planner 判断验证目标和验收口径所需的信息。
    fields:
      fact_id:
        type: string
        required: true
        description: requirement fact 稳定 ID。
      fact_type:
        type: '"requirement_fact"'
        required: true
        description: 固定为 requirement_fact。
      claims:
        type: SourcedClaim[]
        required: true
        description: 需求意图、验收口径、当前 BDD 覆盖范围和不覆盖范围的 claim。
