module: catalog
imports:
  source-ref:
    - AssetSourceRef
    - EvidenceRef
    - SourceLocator
exports:
  ImplementationRef:
    kind: interface
    description: ValidationCatalog 的实现定位注册项；只记录生产源码、配置、符号或 artifact 的可定位引用，不承载 Planner 语义。
    fields:
      implementation_ref_id:
        type: string
        required: true
        description: 实现定位 run 内 ID；用于把 implementation fact 中的生产实现 claim 追溯到可定位源码或 artifact。
      kind:
        type: '"module" | "source_path" | "config" | "api" | "event" | "callback" | "schema" | "asset" | "symbol"'
        required: true
        description: 定位类型，例如模块、源码路径、配置、API、事件、callback、schema、asset 或符号。
      ref:
        type: string
        required: true
        description: 实现定位引用，例如模块名、源码路径、API 名称、事件名、symbol 或 asset path。
      uri:
        type: string
        required: false
        description: 可选本地路径、运行时 URI、知识库 URI 或外部 URL；当 ref 不足以定位时必须提供。
      locator:
        type: SourceLocator
        required: false
        description: 可选来源内具体定位，例如 symbol、line_range、json_path 或 file。
      source_ref_ids:
        type: string[]
        required: true
        description: 支撑该实现定位的 SourceRef ID 列表。
  ValidationCatalog:
    kind: interface
    description: ValidationBody 的 run 内来源与证据目录；承载 SourceRef/EvidenceRef 注册表，不承载 Planner 事实。
    fields:
      catalog_id:
        type: string
        required: true
        description: 本次 run 内部 catalog ID；只要求在当前 run 内稳定，不作为跨 run 身份。
      catalogType:
        type: '"validation_catalog"'
        required: true
        description: 固定类型标识，表示这是 ValidationBody 配套的引用目录。
      runId:
        type: string
        required: true
        description: 生成该 catalog 的 run ID。
      createdAt:
        type: string
        required: true
        description: 该 catalog 创建时间。
      source_refs:
        type: AssetSourceRef[]
        required: true
        description: 本 catalog 的来源注册表；所有 claim 必须引用这里的 source_ref_id。
      evidence_refs:
        type: EvidenceRef[]
        required: true
        description: 本 catalog 的证据注册表；历史证据只作为计划输入，不替代当前 run 证据。
      implementation_refs:
        type: ImplementationRef[]
        required: true
        description: 本 catalog 的实现定位注册表；只记录定位，不记录 Planner 决策语义。
